<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botty — Accedi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #080808;
  color: #fff;
  font-family: 'Barlow', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 700px;
  height: 500px;
  background: radial-gradient(ellipse at center, rgba(255,95,31,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.card {
  width: 100%;
  max-width: 400px;
  background: #0f0f0f;
  border: 1px solid rgba(255,95,31,0.2);
  border-radius: 24px;
  padding: 44px 40px 40px;
  box-shadow: 0 0 80px rgba(255,95,31,0.07);
  text-align: center;
}

.lock-icon {
  width: 52px; height: 52px;
  background: rgba(255,95,31,0.12);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 22px;
}
.lock-icon svg {
  width: 24px; height: 24px;
  stroke: #FF5F1F; fill: none; stroke-width: 2;
  stroke-linecap: round; stroke-linejoin: round;
}

.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 38px; font-weight: 900;
  letter-spacing: 1px; text-transform: uppercase;
  color: #fff; margin-bottom: 6px;
}
.logo span { color: #FF5F1F; }

.sub {
  font-size: 14px;
  color: #666;
  margin-bottom: 32px;
  line-height: 1.5;
}

.field { text-align: left; margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: #555;
  margin-bottom: 7px;
}
.field input {
  width: 100%;
  padding: 13px 16px;
  background: #161616;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  color: #fff;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.field input::placeholder { color: #444; }
.field input:focus { border-color: rgba(255,95,31,0.5); }

.btn {
  width: 100%;
  padding: 14px;
  background: #FF5F1F;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  border: none;
  border-radius: 100px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  margin-top: 4px;
}
.btn:hover { background: #FF7A3D; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn:disabled { background: #333; cursor: default; transform: none; }

.err {
  font-size: 13px;
  color: #ff5252;
  margin-top: 14px;
  min-height: 18px;
  transition: opacity 0.3s;
}

.footer {
  margin-top: 28px;
  font-size: 12px;
  color: #333;
}
.footer span { color: #FF5F1F; }

@keyframes shake {
  0%,100%{ transform: translateX(0); }
  20%    { transform: translateX(-6px); }
  40%    { transform: translateX(6px); }
  60%    { transform: translateX(-4px); }
  80%    { transform: translateX(4px); }
}
.shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<div class="page">
  <div class="card">

    <div class="lock-icon">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <div class="logo">B<span>o</span>tty</div>
    <div class="sub">Area riservata — inserisci le tue credenziali per continuare</div>

    <form id="login-form" autocomplete="on" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Il tuo username"
               autocomplete="username" autofocus />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••"
               autocomplete="current-password" />
      </div>
      <button class="btn" type="submit" id="submit-btn">Accedi →</button>
    </form>

    <div class="err" id="err-msg"></div>

  </div>
  <div class="footer">© 2026 B<span>o</span>tty</div>
</div>

<script>
(function () {
  var KEY = 'botty_lw_auth';
  var TARGET = 'botty.html';

  if (localStorage.getItem(KEY) === '1') {
    window.location.replace(TARGET);
    return;
  }

  var form = document.getElementById('login-form');
  var errEl = document.getElementById('err-msg');
  var btn = document.getElementById('submit-btn');
  var card = document.querySelector('.card');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var u = document.getElementById('username').value.trim();
    var p = document.getElementById('password').value;

    if (u === 'anto' && p === 'Botty2026') {
      localStorage.setItem(KEY, '1');
      btn.textContent = 'Accesso in corso…';
      btn.disabled = true;
      setTimeout(function () {
        window.location.replace(TARGET);
      }, 300);
    } else {
      errEl.textContent = 'Credenziali errate. Riprova.';
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
      setTimeout(function () { errEl.textContent = ''; }, 3500);
    }
  });
})();
</script>

</body>
</html>
